<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Target Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="banner">
    <img src="banner.jpg" alt="Pokeball" class="banner-img">
  </div>
  <header>
    <div class="header-left">
      <h1>Pokemon Target Monitor</h1>
      <span id="connection-status" class="status-dot disconnected" title="Disconnected"></span>
    </div>
    <button id="config-toggle" class="btn btn-icon" title="Settings">&#9881;</button>
  </header>

  <!-- Config Panel -->
  <div id="config-panel" class="config-panel hidden">
    <h2>Settings</h2>
    <div class="config-row">
      <label for="poll-interval">Poll interval (seconds)</label>
      <input type="number" id="poll-interval" min="5" max="120" value="10">
    </div>
    <div class="config-row">
      <label for="auto-open">Auto-open browser on alert</label>
      <input type="checkbox" id="auto-open" checked>
    </div>
    <div class="config-row">
      <label for="sound-enabled">Sound notifications</label>
      <input type="checkbox" id="sound-enabled" checked>
    </div>
    <div class="config-row">
      <label for="auto-add-cart">Auto-add to cart on stock detection</label>
      <input type="checkbox" id="auto-add-cart">
    </div>
    <div class="config-row">
      <label for="zip-code">ZIP code (for local store availability)</label>
      <input type="text" id="zip-code" placeholder="e.g. 75067" maxlength="5" pattern="[0-9]{5}">
    </div>
    <button id="save-config" class="btn btn-primary">Save</button>
  </div>

  <!-- Add Product Form -->
  <section class="add-product">
    <h2>Add Product</h2>
    <form id="add-product-form">
      <input type="text" id="product-name" placeholder="Product name" required>
      <input type="text" id="product-tcin" placeholder="TCIN (e.g. 95230445)" required>
      <button type="submit" class="btn btn-primary">Add</button>
    </form>
  </section>

  <!-- Product Cards -->
  <section>
    <h2>Monitored Products</h2>
    <div id="product-grid" class="product-grid">
      <!-- populated by JS -->
    </div>
  </section>

  <!-- Restock Predictions -->
  <section>
    <div class="section-header">
      <h2>Restock Predictions</h2>
      <button id="refresh-predictions" class="btn btn-primary">Analyze</button>
    </div>
    <div id="predictions-list" class="predictions-list">
      <p class="empty-state">Click "Analyze" to generate restock predictions (requires Ollama)</p>
    </div>
  </section>

  <!-- Alert History -->
  <section>
    <h2>Alert History</h2>
    <div id="alert-list" class="alert-list">
      <p class="empty-state">No alerts yet</p>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
